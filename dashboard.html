<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunni KPI Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #fafaf8;
    --border: #e8e4dd;
    --accent: #4f9cf9;
    --accent-hover: #3b8de6;
    --accent-text: #ffffff;
    --blue: #4f9cf9;
    --pink: #f472b6;
    --orange: #fb923c;
    --purple: #a78bfa;
    --red: #ef4444;
    --green: #34d399;
    --text: #1a1814;
    --muted: #8a8478;
    --accent2: #a78bfa;
    --accent3: #f472b6;
    --accent4: #fb923c;
    --font-display: 'DM Sans', sans-serif;
    --font-mono: 'DM Sans', sans-serif;
    --grid-color: transparent;
    --chart-grid: rgba(0,0,0,0.06);
    --shadow: 0 4px 12px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(200,240,96,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,240,96,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }

  .header-left h1 {
    font-family: var(--font-display);
    font-size: 3rem;
    line-height: 1;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .header-left h1 span {
    color: var(--accent);
    font-style: italic;
  }

  .header-left p {
    margin-top: 8px;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 12px;
  }

  /* API Config */
  .api-config {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .api-config input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    border-radius: 4px;
    width: 280px;
    transition: border-color 0.2s;
  }

  .api-config input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .api-config input::placeholder { color: var(--muted); }

  button {
    background: var(--accent);
    color: #0d0f14;
    border: none;
    padding: 8px 18px;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    font-weight: 500;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: opacity 0.2s, transform 0.1s;
  }

  button:hover { opacity: 0.85; }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .status-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }

  .dot.live { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
  .dot.error { background: var(--accent3); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* KPI Cards */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .kpi-card:nth-child(1)::before { background: var(--accent); }
  .kpi-card:nth-child(2)::before { background: var(--accent2); }
  .kpi-card:nth-child(3)::before { background: var(--accent3); }
  .kpi-card:nth-child(4)::before { background: var(--accent4); }

  .kpi-card:hover { border-color: #353a4a; }

  .kpi-label {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .kpi-value {
    font-family: var(--font-display);
    font-size: 2.8rem;
    line-height: 1;
    color: var(--text);
  }

  .kpi-value.accent { color: var(--accent); }
  .kpi-value.accent2 { color: var(--accent2); }
  .kpi-value.accent3 { color: var(--accent3); }
  .kpi-value.accent4 { color: var(--accent4); }

  .kpi-sub {
    margin-top: 8px;
    font-size: 0.7rem;
    color: var(--muted);
  }

  /* Charts row */
  .charts-row {
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 16px;
    margin-bottom: 32px;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px;
  }

  .chart-title {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .chart-title span {
    color: var(--accent);
    margin-right: 8px;
  }

  .chart-container {
    position: relative;
  }

  /* Timeline chart full width */
  .chart-full {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px;
    margin-bottom: 32px;
  }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    gap: 10px;
  }

  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-msg {
    background: rgba(240,96,168,0.08);
    border: 1px solid rgba(240,96,168,0.2);
    border-radius: 8px;
    padding: 20px 24px;
    color: var(--accent3);
    font-size: 0.75rem;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  /* Updated time */
  .updated-time {
    text-align: right;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 16px;
    letter-spacing: 0.08em;
  }

  /* Donut legend */
  .donut-legend {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 20px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.72rem;
  }

  .legend-left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .legend-name { color: var(--text); }

  .legend-count {
    color: var(--muted);
    font-size: 0.68rem;
  }

  @media (max-width: 768px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
    header { flex-direction: column; gap: 20px; }
    .header-right { align-items: flex-start; }
    .header-left h1 { font-size: 2rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-left">
      <h1>Lunni <span>KPI</span></h1>
      <p>Asiakasportfolio — Live Dashboard</p>
    </div>
    <div class="header-right" style="gap:16px;display:flex;flex-direction:column;align-items:flex-end">
      <a href="/logout" style="font-size:0.7rem;color:#6b7080;text-decoration:none;letter-spacing:0.08em;padding:6px 14px;border:1px solid #252936;border-radius:4px" onmouseover="this.style.color='#f060a8';this.style.borderColor='#f060a8'" onmouseout="this.style.color='#6b7080';this.style.borderColor='#252936'">Kirjaudu ulos</a>
      <div class="api-config">
        <input type="password" id="apiToken" placeholder="Bearer token..." />
        <button onclick="loadData()" id="loadBtn">Hae data</button>
      </div>
      <div class="status-dot">
        <div class="dot" id="statusDot"></div>
        <span id="statusText">Syötä token ja hae data</span>
      </div>
    </div>
  </header>

  <div id="errorBox" class="error-msg" style="display:none"></div>

  <!-- KPI Cards -->
  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">Kaikki tilit</div>
      <div class="kpi-value accent" id="kpiTotal">—</div>
      <div class="kpi-sub">accounts yhteensä</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Asiakkaat</div>
      <div class="kpi-value accent2" id="kpiCustomers">—</div>
      <div class="kpi-sub" id="kpiCustomersSub">classification 100</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Potentiaaliset</div>
      <div class="kpi-value accent3" id="kpiProspects">—</div>
      <div class="kpi-sub" id="kpiProspectsSub">classification 75</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Konversioaste</div>
      <div class="kpi-value accent4" id="kpiConversion">—</div>
      <div class="kpi-sub">potentiaaliset → asiakkaat</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title"><span>◆</span>Jakauma luokittain</div>
      <div class="chart-container" style="height:220px">
        <canvas id="donutChart"></canvas>
      </div>
      <div class="donut-legend" id="donutLegend"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title"><span>◆</span>Uudet tilit kuukausittain (12 kk)</div>
      <div class="chart-container" style="height:280px">
        <div class="loading" id="barLoading"><div class="spinner"></div> Ladataan...</div>
        <canvas id="barChart" style="display:none"></canvas>
      </div>
    </div>
  </div>

  <div class="updated-time" id="updatedTime"></div>
</div>

<script>
const COLORS = {
  100: { color: '#60c8f0', label: 'Asiakas' },
  75:  { color: '#f060a8', label: 'Potentiaalinen' },
  25:  { color: '#f0a860', label: 'Toimittaja' },
  90:  { color: '#c8f060', label: 'Kumppani' },
  null: { color: '#4a5060', label: 'Ei luokiteltu' }
};

let donutChartInst = null;
let barChartInst = null;

async function autoLoadToken() {
  try {
    const r = await fetch("/api/token");
    const data = await r.json();
    if (data.token) {
      document.getElementById("apiToken").value = data.token;
      loadData();
    }
  } catch(e) {}
}

async function loadData() {
  const token = document.getElementById('apiToken').value.trim();
  if (!token) {
    showError('Syötä API-token ensin.');
    return;
  }

  setStatus('loading', 'Haetaan dataa...');
  document.getElementById('loadBtn').disabled = true;
  document.getElementById('errorBox').style.display = 'none';

  try {
    // Käyttää paikallista proxya CORS-ongelman välttämiseksi
    const res = await fetch('/api/accounts', {
      headers: {
        'Authorization': `Bearer ${token}`,
        'X-API-Key': token,  // tuki molemmille auth-tavoille
        'Content-Type': 'application/json'
      }
    });

    if (!res.ok) {
      throw new Error(`API virhe: ${res.status} ${res.statusText}`);
    }

    const data = await res.json();
    renderDashboard(data);
    setStatus('live', `Päivitetty ${new Date().toLocaleTimeString('fi-FI')}`);
    document.getElementById('updatedTime').textContent = `Viimeksi haettu: ${new Date().toLocaleString('fi-FI')}`;
  } catch (err) {
    setStatus('error', 'Virhe haussa');
    showError(`Datan haku epäonnistui: ${err.message}\n\nVarmista että token on oikein ja selain sallii CORS-pyynnöt Lunni API:in.`);
  } finally {
    document.getElementById('loadBtn').disabled = false;
  }
}

function renderDashboard(data) {
  // KPI counts
  const counts = {};
  data.forEach(item => {
    const c = item.classification ?? 'null';
    counts[c] = (counts[c] || 0) + 1;
  });

  const total = data.length;
  const customers = counts['100'] || 0;
  const prospects = counts['75'] || 0;
  const convRate = prospects > 0 ? Math.round((customers / (customers + prospects)) * 100) : 0;

  document.getElementById('kpiTotal').textContent = total;
  document.getElementById('kpiCustomers').textContent = customers;
  document.getElementById('kpiProspects').textContent = prospects;
  document.getElementById('kpiConversion').textContent = convRate + '%';

  document.getElementById('kpiCustomersSub').textContent =
    `${Math.round(customers/total*100)}% kaikista`;
  document.getElementById('kpiProspectsSub').textContent =
    `${Math.round(prospects/total*100)}% kaikista`;

  renderDonut(counts, total);
  renderBar(data);
}

function renderDonut(counts, total) {
  const labels = [], values = [], colors = [], legendItems = [];

  Object.entries(counts)
    .sort((a,b) => b[1]-a[1])
    .forEach(([key, val]) => {
      const info = COLORS[key] || COLORS[null];
      labels.push(info.label);
      values.push(val);
      colors.push(info.color);
      legendItems.push({ label: info.label, count: val, pct: Math.round(val/total*100), color: info.color });
    });

  if (donutChartInst) donutChartInst.destroy();

  const ctx = document.getElementById('donutChart').getContext('2d');
  donutChartInst = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: colors,
        borderColor: '#13161e',
        borderWidth: 3,
        hoverBorderWidth: 3
      }]
    },
    options: {
      cutout: '72%',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.label}: ${ctx.raw} (${Math.round(ctx.raw/total*100)}%)`
          }
        }
      },
      animation: { animateRotate: true, duration: 800 }
    }
  });

  // Legend
  const legendEl = document.getElementById('donutLegend');
  legendEl.innerHTML = legendItems.map(item => `
    <div class="legend-item">
      <div class="legend-left">
        <div class="legend-dot" style="background:${item.color}"></div>
        <span class="legend-name">${item.label}</span>
      </div>
      <span class="legend-count">${item.count} · ${item.pct}%</span>
    </div>
  `).join('');
}

function renderBar(data) {
  document.getElementById('barLoading').style.display = 'none';
  document.getElementById('barChart').style.display = 'block';

  // Last 12 months
  const now = new Date();
  const monthData = {};
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    monthData[key] = { customers: 0, prospects: 0, others: 0 };
  }

  data.forEach(item => {
    if (!item.created) return;
    const key = item.created.substring(0, 7);
    if (!monthData[key]) return;
    const c = item.classification;
    if (c === 100) monthData[key].customers++;
    else if (c === 75) monthData[key].prospects++;
    else monthData[key].others++;
  });

  const labels = Object.keys(monthData).map(k => {
    const [y, m] = k.split('-');
    return new Date(y, m-1).toLocaleString('fi-FI', { month: 'short', year: '2-digit' });
  });

  const custData = Object.values(monthData).map(d => d.customers);
  const prospData = Object.values(monthData).map(d => d.prospects);
  const otherData = Object.values(monthData).map(d => d.others);

  if (barChartInst) barChartInst.destroy();

  const ctx = document.getElementById('barChart').getContext('2d');
  barChartInst = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Asiakas', data: custData, backgroundColor: '#60c8f0', borderRadius: 3, borderSkipped: false },
        { label: 'Potentiaalinen', data: prospData, backgroundColor: '#f060a8', borderRadius: 3, borderSkipped: false },
        { label: 'Muut', data: otherData, backgroundColor: '#f0a860', borderRadius: 3, borderSkipped: false }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: {
          stacked: true,
          grid: { color: 'rgba(255,255,255,0.03)' },
          ticks: { color: '#6b7080', font: { family: 'DM Mono', size: 10 } }
        },
        y: {
          stacked: true,
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { color: '#6b7080', font: { family: 'DM Mono', size: 10 }, stepSize: 1 }
        }
      },
      plugins: {
        legend: {
          labels: {
            color: '#6b7080',
            font: { family: 'DM Mono', size: 10 },
            boxWidth: 10,
            padding: 16
          }
        }
      },
      animation: { duration: 600 }
    }
  });
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  dot.className = 'dot';
  if (state === 'live') dot.classList.add('live');
  if (state === 'error') dot.classList.add('error');
  statusText.textContent = text;
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.style.display = 'block';
}

// Allow Enter key to trigger load
document.getElementById('apiToken').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadData();
});

// Auto-load token on page start
window.addEventListener('load', autoLoadToken);
</script>
</body>
</html>
